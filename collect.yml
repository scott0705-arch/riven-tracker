name: Collect riven prices

on:
  workflow_dispatch: {}        # manual button + cron-job.org dispatches

concurrency:
  group: collect
  cancel-in-progress: false    # never kill a run that is mid-collection

permissions:
  contents: write              # allow the workflow to push the updated data

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5          # code + config (main)

      - uses: actions/checkout@v5          # data branch -> ./data
        with:
          ref: data
          path: data

      - name: Collect prices
        run: python3 collect.py
        env:
          DATA_DIR: data

      - name: Commit updated data (to the data branch only)
        working-directory: data
        run: |
          git config user.name  "riven-tracker-bot"
          git config user.email "riven-tracker-bot@users.noreply.github.com"
          git add -f recent.json archive.json riven_items_cache.json
          if git diff --cached --quiet; then
            echo "nothing changed; skipping commit"
            exit 0
          fi
          git commit -m "price snapshot $(date -u +'%Y-%m-%d %H:%M UTC')"
          git pull --rebase origin data
          git push origin HEAD:data
