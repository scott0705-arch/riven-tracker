name: Collect riven prices

on:
  schedule:
    - cron: "*/5 * * * *"      # every 5 minutes (UTC; best-effort, may lag)
  workflow_dispatch: {}        # manual "Run workflow" button in the Actions tab

concurrency:
  group: collect
  cancel-in-progress: false    # never kill a run that is mid-collection

permissions:
  contents: write              # allow the workflow to push the updated history

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Collect prices
        run: python collect.py

      - name: Commit updated history
        run: |
          git config user.name  "riven-tracker-bot"
          git config user.email "riven-tracker-bot@users.noreply.github.com"
          git add price_history.json riven_items_cache.json
          if git diff --cached --quiet; then
            echo "nothing changed; skipping commit"
            exit 0
          fi
          git commit -m "price snapshot $(date -u +'%Y-%m-%d %H:%M UTC')"
          git pull --rebase
          git push
